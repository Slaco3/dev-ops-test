on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm install
      - run: npm run build
      - name : Sauvagarde du cache
        uses: action/cache/save@v5
        with:
          path: |
            node_modules
            .next
          key: ${{runner.os }}-node-${{hashfiles('**/pacakge-lock.json')}}

  test: 
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: cypress-io/github-action@v7
        with: 
          start: npm run start
          build: npm run build
